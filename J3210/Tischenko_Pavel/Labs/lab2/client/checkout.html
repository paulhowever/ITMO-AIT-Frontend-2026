<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Подвал обучения - Покупка</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<a class="skip-link" href="#main">Перейти к содержимому</a>
<nav class="navbar navbar-expand-lg navbar-main sticky-top">
  <div class="container py-2">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold" href="index.html">
      <span class="navbar-brand-mark"></span>
      <span>Подвал обучения</span>
    </a>
    <div class="ms-auto d-flex gap-2 align-items-center">
      <button id="themeToggle" type="button" class="btn btn-sm btn-outline-soft pill" aria-label="Переключить тему">
        <svg class="icon" aria-hidden="true" focusable="false"><use href="assets/sprite.svg#icon-moon"></use></svg>
        <span class="visually-hidden">Переключить тему</span>
      </button>
      <span data-auth="userbox" class="small text-muted d-none">Привет, <span data-auth="username"></span></span>
      <button data-auth="logout" type="button" class="btn btn-sm btn-outline-soft d-none">
        <svg class="icon" aria-hidden="true" focusable="false"><use href="assets/sprite.svg#icon-logout"></use></svg>
        <span class="visually-hidden">Выйти</span>
      </button>
    </div>
  </div>
</nav>

<main id="main" class="container py-4 py-md-5" tabindex="-1">
  <section class="row justify-content-center">
    <div class="col-lg-7">
      <div class="glass-card p-3 p-md-4">
        <p class="section-label mb-1 text-center">Покупка</p>
        <h1 class="section-title mb-3 text-center">Оформление курса</h1>
        <div data-checkout="alert" aria-live="polite"></div>

        <div class="course-card p-3 mb-3">
          <div class="d-flex justify-content-between align-items-baseline gap-3">
            <div>
              <div class="fw-semibold" data-checkout="title">—</div>
              <div class="small text-muted" data-checkout="meta">—</div>
            </div>
            <div class="fw-semibold" data-checkout="price">—</div>
          </div>
        </div>

        <div class="small text-muted mb-3">
          После подтверждения курс добавится в кабинет.
        </div>

        <div class="d-flex gap-2">
          <a href="index.html" class="btn btn-sm btn-outline-soft pill w-100">Назад</a>
          <button id="payBtn" type="button" class="btn btn-sm btn-gradient pill w-100">Оплатить и начать</button>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/checkout.js"></script>
</body>
</html>
