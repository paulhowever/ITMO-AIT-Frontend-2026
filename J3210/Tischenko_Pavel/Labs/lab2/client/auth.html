<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Подвал обучения - Вход</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<a class="skip-link" href="#main">Перейти к содержимому</a>
<nav class="navbar navbar-expand-lg navbar-main sticky-top">
  <div class="container py-2">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold" href="index.html">
      <span class="navbar-brand-mark"></span>
      <span>Подвал обучения</span>
    </a>
    <button class="navbar-toggler border-0 shadow-none" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNav"
            aria-controls="mainNav" aria-expanded="false" aria-label="Переключить навигацию">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="mainNav">
      <ul class="navbar-nav me-3">
        <li class="nav-item"><a class="nav-link" href="index.html#search">Каталог курсов</a></li>
        <li class="nav-item"><a class="nav-link" href="student.html" data-nav-role="student">Кабинет студента</a></li>
        <li class="nav-item"><a class="nav-link" href="teacher.html" data-nav-role="teacher">Кабинет преподавателя</a></li>
      </ul>
      <div class="d-flex gap-2 align-items-center">
        <button id="themeToggle" type="button" class="btn btn-sm btn-outline-soft pill" aria-label="Переключить тему">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="assets/sprite.svg#icon-moon"></use></svg>
          <span class="visually-hidden">Переключить тему</span>
        </button>
        <a data-auth="login" href="auth.html#login" class="btn btn-sm btn-outline-soft d-none">Вход</a>
        <a data-auth="register" href="auth.html#register" class="btn btn-sm btn-outline-primary pill d-none">Регистрация</a>
        <span data-auth="userbox" class="small text-muted d-none">
          Привет, <span data-auth="username"></span>
        </span>
        <button data-auth="logout" type="button" class="btn btn-sm btn-outline-soft d-none">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="assets/sprite.svg#icon-logout"></use></svg>
          <span class="visually-hidden">Выйти</span>
        </button>
      </div>
    </div>
  </div>
</nav>
<main id="main" class="container py-4 py-md-5" tabindex="-1">
  <section class="row justify-content-center">
    <div class="col-lg-6">
      <div class="glass-card p-3 p-md-4">
        <p class="section-label mb-1 text-center">Авторизация</p>
        <h1 class="section-title mb-3 text-center">Вход и регистрация</h1>
        <ul class="nav nav-pills justify-content-center mb-3 small" id="authTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active pill" id="login-tab"
                    data-bs-toggle="pill" data-bs-target="#login-tab-pane"
                    type="button" role="tab">
              Вход
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link pill" id="register-tab"
                    data-bs-toggle="pill" data-bs-target="#register-tab-pane"
                    type="button" role="tab">
              Регистрация
            </button>
          </li>
        </ul>
        <div class="tab-content small">
          <div class="tab-pane fade show active" id="login-tab-pane" role="tabpanel">
            <form class="row g-3" id="login" aria-label="Форма входа">
              <div data-auth-alert="login" aria-live="polite"></div>
              <div class="col-12">
                <label class="form-label small text-muted" for="loginEmail">Email</label>
                <input id="loginEmail" name="email" type="email" class="form-control form-control-sm" placeholder="you@example.com" autocomplete="email" required>
              </div>
              <div class="col-12">
                <label class="form-label small text-muted" for="loginPassword">Пароль</label>
                <input id="loginPassword" name="password" type="password" class="form-control form-control-sm" autocomplete="current-password" required>
              </div>
              <div class="col-12">
                <label class="form-label small text-muted" for="loginRole">Войти как</label>
                <select id="loginRole" name="role" class="form-select form-select-sm">
                  <option value="student" selected>Студент</option>
                  <option value="teacher">Преподаватель</option>
                </select>
              </div>
              <div class="col-12 d-flex justify-content-between align-items-center">
                <button id="loginSubmit" type="submit" class="btn btn-sm btn-gradient pill">
                  Войти
                </button>
                <a href="#" id="forgotPasswordLink" class="small text-muted text-decoration-none">
                  Забыли пароль?
                </a>
              </div>
            </form>
          </div>
          <div class="tab-pane fade" id="register-tab-pane" role="tabpanel">
            <form class="row g-3" id="register" aria-label="Форма регистрации">
              <div data-auth-alert="register" aria-live="polite"></div>
              <div class="col-md-6">
                <label class="form-label small text-muted" for="registerFirstName">Имя</label>
                <input id="registerFirstName" name="firstName" type="text" class="form-control form-control-sm" autocomplete="given-name">
              </div>
              <div class="col-md-6">
                <label class="form-label small text-muted" for="registerLastName">Фамилия</label>
                <input id="registerLastName" name="lastName" type="text" class="form-control form-control-sm" autocomplete="family-name">
              </div>
              <div class="col-12">
                <label class="form-label small text-muted" for="registerEmail">Email</label>
                <input id="registerEmail" name="email" type="email" class="form-control form-control-sm" autocomplete="email" required>
              </div>
              <div class="col-12">
                <label class="form-label small text-muted" for="registerRole">Роль</label>
                <select id="registerRole" name="role" class="form-select form-select-sm">
                  <option value="student" selected>Студент</option>
                  <option value="teacher">Преподаватель</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label small text-muted" for="registerPassword">Пароль</label>
                <input id="registerPassword" name="password" type="password" class="form-control form-control-sm" autocomplete="new-password" required>
              </div>
              <div class="col-12">
                <button id="registerSubmit" type="submit" class="btn btn-sm btn-gradient pill w-100">
                  Создать аккаунт
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/auth.js"></script>
</body>
</html>
