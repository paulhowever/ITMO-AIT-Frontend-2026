<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Подвал обучения - Сертификат</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<a class="skip-link" href="#main">Перейти к содержимому</a>
<main id="main" class="container py-4 py-md-5" tabindex="-1">
  <div data-cert="alert" aria-live="polite"></div>
  <div class="glass-card p-3 p-md-5">
    <p class="section-label mb-1 text-center">Сертификат</p>
    <h1 class="section-title mb-4 text-center" data-cert="title">—</h1>
    <div class="course-card p-4 text-center">
      <div class="small text-muted mb-2">Выдан</div>
      <div class="h5 mb-2" data-cert="name">—</div>
      <div class="small text-muted mb-3" data-cert="date">—</div>
      <div class="small text-muted mb-0">
        Кнопка “Печать” откроет системный диалог, откуда можно “Сохранить как PDF”.
      </div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <a href="student.html" class="btn btn-sm btn-outline-soft pill w-100">В кабинет</a>
      <button id="printBtn" type="button" class="btn btn-sm btn-gradient pill w-100">Печать (PDF)</button>
    </div>
  </div>
</main>

<script type="module" src="js/certificate.js"></script>
</body>
</html>
