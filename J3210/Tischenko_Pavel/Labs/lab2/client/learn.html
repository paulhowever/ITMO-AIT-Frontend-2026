<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Подвал обучения - Обучение</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<a class="skip-link" href="#main">Перейти к содержимому</a>
<nav class="navbar navbar-expand-lg navbar-main sticky-top">
  <div class="container py-2">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold" href="index.html">
      <span class="navbar-brand-mark"></span>
      <span>Подвал обучения</span>
    </a>
    <button class="navbar-toggler border-0 shadow-none" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNav"
            aria-controls="mainNav" aria-expanded="false" aria-label="Переключить навигацию">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="mainNav">
      <ul class="navbar-nav me-3">
        <li class="nav-item"><a class="nav-link" href="index.html#search">Каталог курсов</a></li>
        <li class="nav-item"><a class="nav-link" href="student.html" data-nav-role="student">Кабинет студента</a></li>
      </ul>
      <div class="d-flex gap-2 align-items-center">
        <button id="themeToggle" type="button" class="btn btn-sm btn-outline-soft pill" aria-label="Переключить тему">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="assets/sprite.svg#icon-moon"></use></svg>
          <span class="visually-hidden">Переключить тему</span>
        </button>
        <span data-auth="userbox" class="small text-muted d-none">Привет, <span data-auth="username"></span></span>
        <button data-auth="logout" type="button" class="btn btn-sm btn-outline-soft d-none">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="assets/sprite.svg#icon-logout"></use></svg>
          <span class="visually-hidden">Выйти</span>
        </button>
      </div>
    </div>
  </div>
</nav>

<main id="main" class="container py-4 py-md-5" tabindex="-1">
  <div data-learn="alert" aria-live="polite"></div>
  <section class="mb-3">
    <p class="section-label mb-1">Обучение</p>
    <h1 class="section-title mb-2" data-learn="courseTitle">—</h1>
    <div class="small text-muted" data-learn="courseMeta">—</div>
  </section>

  <section class="row g-3 g-md-4">
    <div class="col-lg-4">
      <div class="tab-card p-3 h-100">
        <div class="d-flex justify-content-between align-items-baseline mb-2">
          <div class="fw-semibold">Программа</div>
          <div class="small text-muted" data-learn="progress">—</div>
        </div>
        <ul class="nav nav-pills small mb-2" role="tablist" aria-label="Тип контента">
          <li class="nav-item" role="presentation">
            <button class="nav-link active pill" type="button" data-learn-tab="lessons">Лекции</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link pill" type="button" data-learn-tab="seminars">Семинары</button>
          </li>
        </ul>
        <div class="list-group" data-learn="list" role="list" aria-label="Список элементов"></div>
      </div>
    </div>
    <div class="col-lg-8">
      <div class="glass-card p-3 p-md-4 h-100">
        <div class="d-flex justify-content-between align-items-baseline mb-2">
          <div class="fw-semibold" data-learn="itemTitle">—</div>
          <button id="completeBtn" type="button" class="btn btn-sm btn-outline-soft pill">Отметить как выполнено</button>
        </div>
        <div class="fake-video" data-learn="player">Выбери элемент слева.</div>
        <div class="small text-muted mt-3" data-learn="hint"></div>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/learn.js"></script>
</body>
</html>
